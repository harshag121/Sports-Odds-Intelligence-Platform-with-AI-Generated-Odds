<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OddsAI - Secure Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@300;500;700;900&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(25, 37, 64, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .terminal-pulse {
            box-shadow: 0 0 20px rgba(133, 173, 255, 0.15);
        }
        body {
            background-color: #060e20;
            color: #dee5ff;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#00452d",
                        "tertiary": "#ffb148",
                        "primary": "#85adff",
                        "outline": "#6d758c",
                        "secondary-dim": "#58e7ab",
                        "outline-variant": "#40485d",
                        "secondary-fixed": "#69f6b8",
                        "error": "#ff716c",
                        "inverse-on-surface": "#4d556b",
                        "background": "#060e20",
                        "primary-dim": "#699cff",
                        "primary-fixed-dim": "#5391ff",
                        "on-tertiary-fixed-variant": "#563400",
                        "surface-tint": "#85adff",
                        "secondary-fixed-dim": "#58e7ab",
                        "on-surface-variant": "#a3aac4",
                        "surface-container-lowest": "#000000",
                        "on-primary": "#002c66",
                        "surface-bright": "#1f2b49",
                        "on-tertiary-container": "#4a2c00",
                        "on-secondary": "#005a3c",
                        "tertiary-fixed-dim": "#e79400",
                        "on-tertiary": "#573500",
                        "secondary-container": "#006c49",
                        "on-tertiary-fixed": "#2a1700",
                        "primary-fixed": "#6e9fff",
                        "surface-variant": "#192540",
                        "on-primary-container": "#002150",
                        "on-background": "#dee5ff",
                        "on-error": "#490006",
                        "on-primary-fixed": "#000000",
                        "on-secondary-fixed-variant": "#006544",
                        "surface-container": "#0f1930",
                        "on-error-container": "#ffa8a3",
                        "on-primary-fixed-variant": "#002a62",
                        "on-surface": "#dee5ff",
                        "tertiary-container": "#f8a010",
                        "inverse-primary": "#005bc4",
                        "surface": "#060e20",
                        "surface-container-highest": "#192540",
                        "surface-dim": "#060e20",
                        "inverse-surface": "#faf8ff",
                        "error-dim": "#d7383b",
                        "surface-container-high": "#141f38",
                        "tertiary-fixed": "#f8a010",
                        "error-container": "#9f0519",
                        "surface-container-low": "#091328",
                        "on-secondary-container": "#e1ffec",
                        "secondary": "#69f6b8",
                        "tertiary-dim": "#e79400"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
</head>
<body class="font-body selection:bg-primary/30 min-h-screen overflow-hidden flex items-center justify-center">
<!-- Background Layer (The Canvas) -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-background"></div>
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
<!-- Decorative Grid -->
<div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#85adff 1px, transparent 0); background-size: 40px 40px;"></div>
</div>
<!-- Main Auth Canvas -->
<main class="relative z-10 w-full max-w-[480px] px-6">
<!-- Brand Anchor -->
<div class="mb-8 text-center">
<h1 class="font-headline text-4xl font-black text-primary tracking-tighter animate-pulse mb-2">OddsAI</h1>
<div class="flex items-center justify-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
<p class="font-mono text-[10px] uppercase tracking-[0.2em] text-on-surface-variant">Secure Predictive Gateway v1.0</p>
</div>
</div>
<!-- Authentication Modal -->
<div class="glass-panel rounded-xl border border-outline-variant/20 terminal-pulse overflow-hidden">
<!-- Header Scanline -->
<div class="h-1 w-full bg-gradient-to-r from-transparent via-primary/40 to-transparent"></div>
<div class="p-8 md:p-10">
<div class="mb-8">
<h2 class="font-headline text-2xl font-bold text-on-surface tracking-tight mb-1">Intelligence Access</h2>
<p class="text-sm text-on-surface-variant/80">Initialize your terminal session to view live markets.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="group">
<label class="block font-mono text-[10px] uppercase tracking-widest text-primary mb-2 transition-colors group-focus-within:text-secondary">
                            Access ID / Email
                        </label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant/30 border-x-0 border-t-0 px-4 py-3 text-on-surface font-mono text-sm placeholder:text-outline-variant focus:ring-0 focus:border-primary transition-all duration-300" placeholder="USER_@ODDSAI.TECH" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant text-sm" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block font-mono text-[10px] uppercase tracking-widest text-primary mb-2 transition-colors group-focus-within:text-secondary">
                            Security Protocol / Password
                        </label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant/30 border-x-0 border-t-0 px-4 py-3 text-on-surface font-mono text-sm placeholder:text-outline-variant focus:ring-0 focus:border-primary transition-all duration-300" placeholder="••••••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant text-sm" data-icon="lock_open">lock_open</span>
</div>
</div>
<!-- Auth Actions -->
<div class="flex items-center justify-between text-[11px] font-mono uppercase tracking-tighter pt-2">
<label class="flex items-center gap-2 cursor-pointer group text-on-surface-variant hover:text-on-surface transition-colors">
<input class="w-3 h-3 bg-surface-container-highest border-outline-variant rounded-sm checked:bg-primary focus:ring-0" type="checkbox"/>
                            Persist Session
                        </label>
<a class="text-primary hover:text-secondary transition-colors" href="#">Recover Access</a>
</div>
<!-- Primary CTA -->
<button class="w-full group relative overflow-hidden rounded-lg bg-gradient-to-r from-primary to-primary-fixed p-[1px] transition-transform active:scale-[0.98]" type="submit">
<div class="relative bg-surface py-4 flex items-center justify-center gap-3 transition-colors group-hover:bg-transparent">
<span class="font-headline font-bold uppercase tracking-widest text-sm text-on-surface group-hover:text-on-primary">Establish Connection</span>
<span class="material-symbols-outlined text-lg transition-transform group-hover:translate-x-1 group-hover:text-on-primary" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
</form>
<!-- Social/Alternate Access -->
<div class="mt-10">
<div class="relative flex items-center mb-6">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="flex-shrink mx-4 font-mono text-[9px] uppercase tracking-widest text-outline-variant">External Nodes</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high border border-outline-variant/10 rounded-lg transition-all duration-200">
<div class="w-5 h-5 bg-on-surface flex items-center justify-center rounded-sm">
<span class="material-symbols-outlined text-[14px] text-background" data-icon="terminal">terminal</span>
</div>
<span class="font-mono text-[10px] font-bold uppercase tracking-tight text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high border border-outline-variant/10 rounded-lg transition-all duration-200">
<div class="w-5 h-5 bg-on-surface flex items-center justify-center rounded-sm">
<span class="material-symbols-outlined text-[14px] text-background" data-icon="database">database</span>
</div>
<span class="font-mono text-[10px] font-bold uppercase tracking-tight text-on-surface">Web3</span>
</button>
</div>
</div>
</div>
<!-- Modal Footer Meta -->
<div class="bg-surface-container-lowest/50 px-8 py-4 border-t border-outline-variant/10 flex justify-between items-center">
<span class="font-mono text-[9px] text-outline-variant">ENCRYPTION: AES-256-GCM</span>
<a class="font-mono text-[9px] text-primary hover:underline" href="#">New Node? Register</a>
</div>
</div>
<!-- System Status Footer -->
<div class="mt-8 flex items-center justify-center gap-8 font-mono text-[9px] uppercase tracking-[0.2em] text-on-surface-variant/40">
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-secondary"></span>
                SYST: ONLINE
            </div>
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-secondary"></span>
                LATENCY: 14MS
            </div>
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-tertiary animate-pulse"></span>
                MARKETS: LIVE
            </div>
</div>
</main>
<!-- Visual Accents (Corners) -->
<div class="fixed top-6 left-6 pointer-events-none opacity-20">
<div class="w-12 h-12 border-t-2 border-l-2 border-primary"></div>
</div>
<div class="fixed bottom-6 right-6 pointer-events-none opacity-20">
<div class="w-12 h-12 border-b-2 border-r-2 border-primary"></div>
</div>
</body></html>
